<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyDSA - Dynamic Data Structures & Algorithms Visualizer</title>
    <!-- FontAwesome Icons for modern aesthetic -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Style Sheet -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Radial Neon Glow Background -->
    <div class="bg-glow-container">
        <div class="bg-glow-1"></div>
        <div class="bg-glow-2"></div>
    </div>

    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fa-solid fa-square-binary"></i>
                    <span>EasyDSA</span>
                </div>
            </div>
            
            <div class="sidebar-content">
                <!-- Data Structures -->
                <div class="category-group">
                    <div class="category-title">Linear Structures</div>
                    <ul class="nav-list">
                        <li class="nav-item active" data-topic="arrays">
                            <button><i class="fa-solid fa-table-cells"></i> Arrays</button>
                        </li>
                        <li class="nav-item" data-topic="stack">
                            <button><i class="fa-solid fa-layer-group"></i> Stack</button>
                        </li>
                        <li class="nav-item" data-topic="queue">
                            <button><i class="fa-solid fa-arrow-right-to-bracket"></i> Queue</button>
                        </li>
                        <li class="nav-item" data-topic="deque">
                            <button><i class="fa-solid fa-arrows-left-right"></i> Deque</button>
                        </li>
                        <li class="nav-item" data-topic="linkedlist">
                            <button><i class="fa-solid fa-link"></i> Linked List</button>
                        </li>
                        <li class="nav-item" data-topic="doublylinkedlist">
                            <button><i class="fa-solid fa-arrows-h"></i> Doubly Linked List</button>
                        </li>
                        <li class="nav-item" data-topic="circularlinkedlist">
                            <button><i class="fa-solid fa-arrows-spin"></i> Circular Linked List</button>
                        </li>
                    </ul>
                </div>

                <div class="category-group">
                    <div class="category-title">Trees & Hierarchies</div>
                    <ul class="nav-list">
                        <li class="nav-item" data-topic="binarytree">
                            <button><i class="fa-solid fa-tree"></i> Binary Tree</button>
                        </li>
                        <li class="nav-item" data-topic="tree-bfs">
                            <button><i class="fa-solid fa-network-wired"></i> BFS in Tree</button>
                        </li>
                        <li class="nav-item" data-topic="bst">
                            <button><i class="fa-solid fa-network-wired"></i> Binary Search Tree</button>
                        </li>
                        <li class="nav-item" data-topic="heaps">
                            <button><i class="fa-solid fa-cubes"></i> Heaps / PQ</button>
                        </li>
                        <li class="nav-item" data-topic="trie">
                            <button><i class="fa-solid fa-font"></i> Trie</button>
                        </li>
                        <li class="nav-item" data-topic="segmenttree">
                            <button><i class="fa-solid fa-sitemap"></i> Segment Tree</button>
                        </li>
                    </ul>
                </div>

                <div class="category-group">
                    <div class="category-title">Graphs & Strings</div>
                    <ul class="nav-list">
                        <li class="nav-item" data-topic="graph">
                            <button><i class="fa-solid fa-diagram-project"></i> Graph</button>
                        </li>
                        <li class="nav-item" data-topic="strings">
                            <button><i class="fa-solid fa-quote-right"></i> String</button>
                        </li>
                    </ul>
                </div>

                <!-- Algorithms -->
                <div class="category-group">
                    <div class="category-title">Algorithms</div>
                    <ul class="nav-list">
                        <li class="nav-item" data-topic="sorting">
                            <button><i class="fa-solid fa-arrow-down-wide-short"></i> Sorting Algorithms</button>
                        </li>
                        <li class="nav-item" data-topic="searching">
                            <button><i class="fa-solid fa-magnifying-glass"></i> Linear/Binary Search</button>
                        </li>
                        <li class="nav-item" data-topic="kadane">
                            <button><i class="fa-solid fa-chart-line"></i> Kadane's Algorithm</button>
                        </li>
                        <li class="nav-item" data-topic="greedy">
                            <button><i class="fa-solid fa-coins"></i> Greedy Algorithms</button>
                        </li>
                        <li class="nav-item" data-topic="dp">
                            <button><i class="fa-solid fa-table"></i> Dynamic Programming</button>
                        </li>
                        <li class="nav-item" data-topic="recursion">
                            <button><i class="fa-solid fa-recycle"></i> Recursion</button>
                        </li>
                        <li class="nav-item" data-topic="backtracking">
                            <button><i class="fa-solid fa-chess-board"></i> Backtracking</button>
                        </li>
                        <li class="nav-item" data-topic="kmp">
                            <button><i class="fa-solid fa-magnifying-glass"></i> KMP Matching</button>
                        </li>
                        <li class="nav-item" data-topic="rabin-karp">
                            <button><i class="fa-solid fa-magnifying-glass"></i> Rabin Karp</button>
                        </li>
                        <li class="nav-item" data-topic="pointers-window">
                            <button><i class="fa-solid fa-left-right"></i> Two Pointer & Window</button>
                        </li>
                    </ul>
                </div>
            </div>
        </aside>

        <!-- Main Panel Content -->
        <main class="main-content">
            <!-- Header bar -->
            <header class="top-header">
                <div class="header-left">
                    <button class="menu-toggle" id="menu-toggle">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <div class="topic-title-container">
                        <h1 id="topic-title">Arrays</h1>
                        <span id="difficulty-badge" class="difficulty-badge difficulty-easy">Easy</span>
                    </div>
                </div>
                <div class="header-right">
                    <!-- Complexities stats panel -->
                    <div class="complexity-card">
                        <div class="complexity-item">
                            <span class="complexity-label">Time Complexity</span>
                            <span class="complexity-val" id="time-complexity">O(1)</span>
                        </div>
                        <div class="complexity-divider"></div>
                        <div class="complexity-item">
                            <span class="complexity-label">Space Complexity</span>
                            <span class="complexity-val" id="space-complexity">O(N)</span>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Main Interactive Workspace -->
            <div class="workspace">
                <!-- Control Panel (Dynamic Operations and Playback) -->
                <section class="control-panel">
                    <div class="operation-controls" id="operation-controls">
                        <!-- Controls will be populated dynamically by JavaScript based on active topic -->
                    </div>
                    
                    <div class="animation-controls">
                        <div class="speed-slider-container">
                            <span>Slow</span>
                            <input type="range" id="speed-slider" class="speed-slider" min="100" max="2000" step="100" value="1000">
                            <span>Fast</span>
                        </div>
                        <button class="btn btn-secondary" id="btn-step-backward" title="Step Backward" disabled>
                            <i class="fa-solid fa-step-backward"></i>
                        </button>
                        <button class="btn btn-primary" id="btn-play-pause" title="Play">
                            <i class="fa-solid fa-play"></i>
                        </button>
                        <button class="btn btn-secondary" id="btn-step-forward" title="Step Forward" disabled>
                            <i class="fa-solid fa-step-forward"></i>
                        </button>
                        <button class="btn btn-danger" id="btn-reset" title="Reset">
                            <i class="fa-solid fa-rotate-left"></i>
                        </button>
                    </div>
                </section>

                <!-- Visualization Panel split side-by-side with Code/Logs panel -->
                <div class="visualizer-split">
                    <!-- Canvas Visualization Box -->
                    <section class="visualizer-container" id="visualizer-container">
                        <div id="canvas-overlay">
                            <div class="canvas-msg" id="canvas-message" style="display: none;">Initialize values to begin visualization.</div>
                        </div>
                        
                        <!-- Dynamic Visualizers are mounted here -->
                        <div id="visualizer-workspace" class="canvas-element"></div>
                    </section>

                    <!-- Code / Logs Pane -->
                    <section class="code-log-panel">
                        <div class="panel-tabs">
                            <button class="tab-btn active" data-tab="vis-def">
                                <i class="fa-solid fa-circle-info"></i> Definition
                            </button>
                            <button class="tab-btn" data-tab="java-code">
                                <i class="fa-brands fa-java"></i> Java Snippet
                            </button>
                            <button class="tab-btn" data-tab="vis-logs">
                                <i class="fa-solid fa-terminal"></i> Animation Logs
                            </button>
                        </div>
                        
                        <div class="tab-content-container">
                            <!-- Definition Tab -->
                            <div class="tab-content active" id="tab-vis-def">
                                <div id="definition-content" style="line-height: 1.6; font-size: 0.9rem; color: var(--text-primary);"></div>
                            </div>

                            <!-- Java Code Tab -->
                            <div class="tab-content" id="tab-java-code">
                                <div class="code-container">
                                    <button class="btn-copy-code" id="copy-code-btn"><i class="fa-regular fa-copy"></i> Copy</button>
                                    <pre><code id="code-block-content" style="font-family: var(--font-mono); font-size: 0.8rem; color: #e2e8f0; white-space: pre; display: block; overflow: auto; height: 100%;"></code></pre>
                                </div>
                            </div>
                            
                            <!-- Logs Tab -->
                            <div class="tab-content" id="tab-vis-logs">
                                <ul class="log-list" id="vis-log-list">
                                    <li class="log-item info">Visualizer initialized. Select an action to view execution logs.</li>
                                </ul>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <!-- Script Loads (Sequential loading for CORS/double-click stability) -->
    <script src="js/code-snippets.js"></script>
    <script src="js/visualizer-engine.js"></script>
    <script src="js/structures/linear.js"></script>
    <script src="js/structures/trees.js"></script>
    <script src="js/structures/graph.js"></script>
    <script src="js/algorithms/sorting.js"></script>
    <script src="js/algorithms/searching.js"></script>
    <script src="js/algorithms/advanced.js"></script>
    <script src="js/algorithms/recursion.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
